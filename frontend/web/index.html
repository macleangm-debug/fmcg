<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Software Galaxy</title>
  <!-- Ionicons CSS for web -->
  <link href="https://unpkg.com/ionicons@7.1.0/dist/css/ionicons.min.css" rel="stylesheet">
  <style>
    /* Preload Ionicons font */
    @font-face {
      font-family: 'Ionicons';
      src: url('https://unpkg.com/ionicons@7.1.0/dist/fonts/ionicons.woff2') format('woff2'),
           url('https://unpkg.com/ionicons@7.1.0/dist/fonts/ionicons.woff') format('woff'),
           url('https://unpkg.com/ionicons@7.1.0/dist/fonts/ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    
    /* Ensure icons render correctly */
    .ionicons, [class*="ionicon"] {
      font-family: 'Ionicons' !important;
    }
    
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    #root {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
